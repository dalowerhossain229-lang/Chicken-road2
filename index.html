<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHICKEN ROAD - DYNAMIC MULTIPLIER MULTI-RISK CRASH GAME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🏟 snuff রয়েল চিকেন রোড ক্যানভাস এরিনা -->
    <div class="game-stadium-canvas">
        
        <!-- 👑 ওপরের অফিশিয়াল স্ট্যাটাস ডিসপ্লে বার (স্ক্রিনশটের অবিকল ক্লোন) -->
        <div class="top-status-header">
            <div class="game-title">CHICKEN <span class="title-accent">ROAD</span> <span class="help-icon">?</span></div>
            <div class="live-win-counter" id="live-win-multiplier">0.00 ৳ <span class="menu-burger">≡</span></div>
        </div>

        <!-- 🛣️ ডাইনামিক মেগা আনলিমিটেড হরিজন্টাল স্ক্রোল হাইওয়ে এরিনা (১০০% সিএসএস ও এসভিজি ভেক্টর গ্রাফিক্স) -->
        <div class="highway-arena" id="highway-map">
            
            <!-- 🐓 [১. প্রারম্ভিক ফুটপাত জোন]: মুরগির প্রাথমিক নিরাপদ অবস্থান ঘর -->
            <div class="starting-safe-sidewalk">
                <div class="safe-zone-lbl">START</div>
                <!-- 🐓 [হাইলি অ্যানিমেটেড এসভিজি মুরগি]: মুরগি শুরুতে এই নিরাপদ ঘরের পেটে নাচবে! -->
                <div class="animated-chicken-vector" id="chicken-hero">
                    <svg viewBox="0 0 100 100" class="chicken-svg">
                        <circle cx="50" cy="55" r="30" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
                        <path d="M30,55 Q15,45 25,65 Z" fill="#f5f5f5"/> 
                        <circle cx="65" cy="35" r="18" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
                        <path d="M55,20 Q65,5 75,20 Q65,12 55,20" fill="#e53935"/> 
                        <path d="M60,45 Q65,52 62,45" fill="#e53935" stroke="#e53935" stroke-width="4"/> 
                        <polygon points="78,32 92,38 78,44" fill="#ffb300"/>
                        <circle cx="68" cy="30" r="4" fill="#000000"/>
                        <circle cx="69" cy="29" r="1.5" fill="#ffffff"/> 
                        <path d="M45,85 L45,94 M45,94 L40,96 M45,94 L50,96" stroke="#ffb300" stroke-width="4" stroke-linecap="round"/>
                        <path d="M55,85 L55,94 M55,94 L50,96 M55,94 L60,96" stroke="#ffb300" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>

            <!-- 🚧 ডাইনামিক লেনের কন্টেইনার (জাভাস্ক্রিপ্ট দিয়ে ৪-স্তর ওOdds চার্ট অনুযায়ী ওটো-লোড হবে ওস্তাদ!) -->
            <div id="dynamic-lanes-wrapper" style="display: flex; height: 100%;"></div>

            <!-- 🏁 ডানের চূড়ান্ত উইনিং ফুটপাত জোন -->
            <div class="ending-win-sidewalk">
                <div class="win-zone-lbl">GOAL</div>
            </div>

        </div>

        <!-- 🎛️ নিচের মেইন বেটিং কন্ট্রোল ফুটার বার (১০০% স্ক্রিনশট ও খাতার ড্রয়িং ক্লোন) -->
        <div class="bottom-bet-dashboard">
            
            <div class="bet-id-row">Bet ID: <span class="arrow-down">▼</span></div>

            <!-- ৫০০০.০০৳ স্টেক কন্ট্রোল বাটন প্যাক -->
            <div class="stake-input-container">
                <button class="adjust-btn" onclick="adjustStake('minus')">—</button>
                <div class="stake-value-box"><span id="stake-display">5000.00</span> <span class="currency-sign">৳</span></div>
                <button class="adjust-btn" onclick="adjustStake('plus')">+</button>
                <button class="multiplier-btn" onclick="multiplyStake(0.5)">x0.5</button>
                <button class="multiplier-btn" onclick="multiplyStake(2.0)">x2.0</button>
                <div class="coin-stack-icon">🪙</div>
            </div>

            <!-- রিস্ক লেভেল ফিল্টার সিলেক্টর (Easy, Medium, Hard, Hardcore ৪-স্তর গেটওয়ে লক!) -->
            <div class="risk-dropdown-holder">
                <select id="risk-level-select" onchange="handleRiskLevelChange()">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                    <option value="Hardcore">Hardcore</option>
                </select>
            </div>

            <!-- খাতার অবিকল ডাবল বাটন কন্ট্রোল গ্রিড প্যানেল -->
            <div class="double-action-button-grid">
                <button class="jili-cashout-btn" id="cashout-action-btn" onclick="executeChickenCashOutSequence()" disabled>Cashout</button>
                <button class="jili-play-btn" id="play-action-btn" onclick="executeChickenStepJumpSequence()">Play</button>
            </div>

        </div>

    </div>

    <!-- 📢 ক্যাসিনো রিয়েল-টাইমে অডিও ও সকেট নেটওয়ার্ক ড্রাইভার -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "logged_in_player";
        const urlWallet = urlParams.get('wallet') || "main";
        const SERVER_URL = window.location.origin;

        let walletBalance = 0.00;
        let currentStake = 5000.00; 
        let gameStateStatus = "IDLE"; 
        let currentLanePosition = -1;
        let vehicleSpawnIntervalsList = [];

        // 🎯 [🔒 ওস্তাদ! খাতার ২য় পাতার অবিকল ৪-স্তর অফিশিয়াল ওOdds মাল্টিপ্লায়ার সিঁড়ি ফ্রন্টএন্ড ম্যাপ লক 🔒]
        const chickenRoadMultiRiskLadders = {
            "Easy": [1.02, 1.08, 1.14, 1.21, 1.29, 1.37, 1.46, 1.56, 1.67, 1.80, 1.94, 2.08, 2.23, 2.41, 2.60, 2.81, 3.05, 3.31, 3.61, 3.94, 4.31, 4.73, 5.21, 5.75, 13.94],
            "Medium": [1.08, 1.22, 1.38, 1.57, 1.79, 2.06, 2.41, 31.72],
            "Hard": [1.19, 1.48, 1.89, 2.32, 2.87, 28308.10],
            "Hardcore": [1.45, 2.22, 3.47, 5.42, 4546220.25]
        };

        const svgVehiclesLibrary = [
            `<svg viewBox="0 0 45 90" class="vehicle-svg"><rect x="5" y="10" width="30" height="70" rx="8" fill="#e53935"/><rect x="10" y="25" width="20" height="40" rx="4" fill="#81d4fa"/><circle cx="8" cy="25" r="6" fill="#212121"/><circle cx="8" cy="65" r="6" fill="#212121"/><circle cx="37" cy="25" r="6" fill="#212121"/><circle cx="37" cy="65" r="6" fill="#212121"/></svg>`, 
            `<svg viewBox="0 0 50 110" class="vehicle-svg"><rect x="5" y="5" width="35" height="75" rx="3" fill="#1565c0"/><rect x="15" y="80" width="25" height="25" rx="4" fill="#0d47a1"/><circle cx="8" cy="25" r="7" fill="#111"/><circle cx="8" cy="55" r="7" fill="#111"/><circle cx="42" cy="25" r="7" fill="#111"/><circle cx="42" cy="55" r="7" fill="#111"/></svg>`  
        ];

        // 🚧 ডাইনামিক ৪-স্তর লেন রেন্ডারার ফাংশন (খাতার অবিকল ওOdds বসানোর মেকার)
        function generateDynamicRiskLanesUI() {
            let selectedRisk = document.getElementById("risk-level-select").value;
            let activeLadder = chickenRoadMultiRiskLadders[selectedRisk];
            let wrapper = document.getElementById("dynamic-lanes-wrapper");
            
            wrapper.innerHTML = ""; // আগের লেন ধুয়ে সাফ
            
            activeLadder.forEach((odds, index) => {
                let laneNode = document.createElement("div");
                laneNode.className = "road-lane";
                laneNode.setAttribute("data-lane", index);
                
                // প্রতি লেনের নিজস্ব মাঝখানের ওOdds ম্যানহোল ডিক্লেয়ারেশন লক ওস্তাদ!
                laneNode.innerHTML = `<div class="lane-manhole-node" id="odds-${index}">${odds}</div>`;
                wrapper.appendChild(laneNode);
            });
            
            startHighVelocityTrafficSpawnerEngine(); // ট্রাফিকের এনিমেশন রি-ফায়ার লক
        }

        function handleRiskLevelChange() {
            playAudio('click');
            generateDynamicRiskLanesUI();
        }

        // শুরুতে ডিফল্ট ইজি মোড লোড চ্যাম
        setTimeout(() => { generateDynamicRiskLanesUI(); }, 100);

        async function fetchLivePlatformBalanceSync() {
            try {
                const res = await fetch(`${SERVER_URL}/api/slot-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await res.json();
                if (data && data.success) {
                    walletBalance = parseFloat(data.balance);
                    if (!isNaN(walletBalance)) {
                        document.getElementById("live-win-multiplier").innerHTML = `${walletBalance.toFixed(2)} ৳ <span class="menu-burger">≡</span>`;
                    }
                }
            } catch (e) {}
        }
        fetchLivePlatformBalanceSync();

        function adjustStake(action) {
            if (gameStateStatus === "PLAYING") return;
            if (action === 'minus') { if (currentStake > 10) currentStake -= 10; }
            else if (action === 'plus') { if (currentStake < 5000) currentStake += 10; }
            document.getElementById("stake-display").innerText = currentStake.toFixed(2);
            playAudio('click');
        }

        function multiplyStake(factor) {
            if (gameStateStatus === "PLAYING") return;
            currentStake = currentStake * factor;
            if (currentStake < 1) currentStake = 1.00;
            if (currentStake > 5000) currentStake = 5000.00;
            document.getElementById("stake-display").innerText = currentStake.toFixed(2);
            playAudio('click');
        }
        function startHighVelocityTrafficSpawnerEngine() {
            clearActiveTrafficEngine();
            let lanes = document.querySelectorAll(".road-lane");
            
            lanes.forEach((lane, index) => {
                let spawnSpeed = Math.random() * (1100 - 550) + 550; 
                
                let intervalIdx = setInterval(() => {
                    if (gameStateStatus === "GAMEOVER") return;
                    
                    let vehicleNode = document.createElement("div");
                    vehicleNode.className = "dynamic-vehicle-vessel";
                    vehicleNode.innerHTML = svgVehiclesLibrary[Math.floor(Math.random() * svgVehiclesLibrary.length)];
                    
                    // উপর থেকে নিচে এবং নিচ থেকে ওপরে ট্রাফিক এнимиেশন সিঙ্ক লক
                    if (index % 2 === 0) {
                        vehicleNode.style.top = "-120px";
                        vehicleNode.style.animation = `driveDownAnim ${Math.random() * (2.2 - 1.1) + 1.1}s linear forwards`;
                    } else {
                        vehicleNode.style.top = "500px";
                        vehicleNode.style.animation = `driveUpAnim ${Math.random() * (2.2 - 1.1) + 1.1}s linear forwards`;
                    }
                    
                    lane.appendChild(vehicleNode);
                    setTimeout(() => { vehicleNode.remove(); }, 2500); 
                }, spawnSpeed + (index * 150));
                
                vehicleSpawnIntervalsList.push(intervalIdx);
            });
        }

        function clearActiveTrafficEngine() {
            vehicleSpawnIntervalsList.forEach(clearInterval);
            vehicleSpawnIntervalsList = [];
            document.querySelectorAll(".dynamic-vehicle-vessel").forEach(v => v.remove());
        }

        function resetAllManholeGlows() {
            document.querySelectorAll(".lane-manhole-node").forEach(m => m.className = "lane-manhole-node");
        }

        async function executeChickenMasterTrigger() {
            let playBtn = document.getElementById("play-action-btn");
            let cashBtn = document.getElementById("cashout-action-btn");

            if (gameStateStatus === "IDLE" || gameStateStatus === "GAMEOVER") {
                let selectedRisk = document.getElementById("risk-level-select").value;
                playBtn.disabled = true;
                playAudio('click');
                try {
                    const res = await fetch(`${SERVER_URL}/api/chicken-bet`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: urlUserId, amount: parseFloat(currentStake), wallet: urlWallet, riskLevel: selectedRisk })
                    });
                    const data = await res.json();
                    if (data.success) {
                        gameStateStatus = "PLAYING"; 
                        currentLanePosition = -1;
                        
                        let chicken = document.getElementById("chicken-hero");
                        chicken.style.left = "25px"; 
                        chicken.style.top = "42%";
                        chicken.className = "animated-chicken-vector active-hop";
                        
                        document.getElementById("risk-level-select").disabled = true;
                        resetAllManholeGlows();

                        playBtn.innerText = "JUMP"; 
                        playBtn.className = "jili-play-btn jump-mode-blue";
                        cashBtn.disabled = true;
                        cashBtn.innerText = "Cashout";

                        document.getElementById("highway-map").scrollLeft = 0;
                        fetchLivePlatformBalanceSync();
                    } else { alert(data.message || "❌ ব্যালেন্স অপ্রতুল ওস্তাদ!"); }
                } catch (e) {}
                playBtn.disabled = false;
                return;
            }

            if (gameStateStatus === "PLAYING") {
                playBtn.disabled = true;
                playAudio('bet');
                try {
                    const res = await fetch(`${SERVER_URL}/api/chicken-jump`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: urlUserId })
                    });
                    const data = await res.json();
                    if (data.success) {
                        if (data.status === "CRASH") {
                            gameStateStatus = "GAMEOVER"; 
                            playAudio('stop');
                            document.getElementById("chicken-hero").className = "animated-chicken-vector chicken-splat-dead";
                            setTimeout(() => { alert("💥 SPLAT! মুরগিটি উপর থেকে আসা দ্রুতগামী গাড়ির নিচে পিষ্ট হয়েছে ওস্তাদ!"); resetChickenRoadStadiumToIdle(); }, 600);
                            return;
                        }
                        
                        currentLanePosition = data.currentLane;
                        let chicken = document.getElementById("chicken-hero");
                        
                        // 🚀 [বাম থেকে ডানে লাফানোর সুপ্রীম ম্যাথ লকিং]: ৯০px ফুটপাত + লেন ইনডেক্স x ৮২px
                        let targetLeftPixels = 100 + 41 + (currentLanePosition * 82); 
                        chicken.style.left = `${targetLeftPixels}px`;
                        chicken.style.top = `${40 + (Math.sin(currentLanePosition) * 5)}%`; 
                        
                        // 📈 নির্দিষ্ট লেনের ম্যানহোল ওOdds ডাইনামিক নিওন একটিভ গলো!
                        resetAllManholeGlows();
                        let activeManhole = document.getElementById(`odds-${currentLanePosition}`);
                        if (activeManhole) activeManhole.className = "lane-manhole-node active-glow";

                        playAudio('win');

                        // 🎯 [অটো-ক্যামেরা স্ক্রোল ট্র্যাকার ইঞ্জিন]:
                        let mapContainer = document.getElementById("highway-map");
                        if (targetLeftPixels > (mapContainer.clientWidth / 2)) {
                            mapContainer.scrollTo({
                                left: targetLeftPixels - (mapContainer.clientWidth / 2),
                                behavior: 'smooth'
                            });
                        }

                        if (data.status === "JACKPOT") {
                            gameStateStatus = "GAMEOVER"; 
                            playAudio('megawin');
                            alert(`🏆 মেগা জ্যাকпот সাকসেস! মুরগিটি সম্পূর্ণ রাস্তা নিরাপদে পার হয়েছে! আপনি জিতেছেন Tk${data.winAmount}`);
                            resetChickenRoadStadiumToIdle(); 
                            return;
                        }

                        cashBtn.disabled = false;
                        cashBtn.innerText = `Cashout (${data.currentMultiplier}x)`;
                        cashBtn.className = "jili-cashout-btn cashout-mode-gold";
                        playBtn.innerText = "JUMP";
                    }
                } catch (e) {}
                playBtn.disabled = false;
            }
        }

        async function executeChickenCashOutSequence() {
            let cashBtn = document.getElementById("cashout-action-btn");
            cashBtn.disabled = true;
            playAudio('wheel');
            try {
                const res = await fetch(`${SERVER_URL}/api/chicken-cashout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: urlUserId })
                });
                const data = await res.json();
                if (data.success) {
                    gameStateStatus = "GAMEOVER"; 
                    playAudio('bigwin');
                    alert(`🎉 ক্যাশ আউট সফল ওস্তাদ! আপনি নিরাপদে Tk${data.winAmount} তুলে নিয়েছেন!`);
                    resetChickenRoadStadiumToIdle();
                }
            } catch (e) {}
        }

        function resetChickenRoadStadiumToIdle() {
            let playBtn = document.getElementById("play-action-btn");
            let cashBtn = document.getElementById("cashout-action-btn");
            
            playBtn.innerText = "Play"; 
            playBtn.className = "jili-play-btn";
            cashBtn.disabled = true;
            cashBtn.innerText = "Cashout";
            cashBtn.className = "jili-cashout-btn";

            document.getElementById("risk-level-select").disabled = false;
            resetAllManholeGlows();
            
            let chicken = document.getElementById("chicken-hero");
            chicken.style.left = "25px"; 
            chicken.style.top = "42%";
            chicken.className = "animated-chicken-vector";
            
            document.getElementById("highway-map").scrollLeft = 0; 
            fetchLivePlatformBalanceSync();
            generateDynamicRiskLanesUI(); 
        }

                const slotSounds = {
            bg: new Audio('background.mp3'),
            click: new Audio('click5.mp3'),
            bet: new Audio('bet5.mp3'),
            spin: new Audio('spin5.mp3'),
            stop: new Audio('stop5.mp3'),
            scatter: new Audio('scatter5.mp3'), 
            win: new Audio('win5.mp3'),
            wheel: new Audio('wheel5.mp3'),
            bigwin: new Audio('bigwin5.mp3'),
            megawin: new Audio('megawin5.mp3')
        };
        Object.values(slotSounds).forEach(s => { s.load(); });
        document.addEventListener('click', () => {
            try { slotSounds.bg.loop = true; slotSounds.bg.volume = 0.3; slotSounds.bg.play().catch(e => {}); } catch(e) {}
        }, { once: true });

        function playAudio(type) {
            try { if (slotSounds[type]) { slotSounds[type].currentTime = 0; slotSounds[type].play().catch(e => {}); } } catch(e) {}
        }
    </script>
</body>
</html>
