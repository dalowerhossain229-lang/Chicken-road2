<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHICKEN ROAD - MULTI-RISK LADDER CASINO ENGINE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🏟️ মেইন রয়েল চিকেন রোড ক্যানভাস এরینا -->
    <div class="game-stadium-canvas">
        
        <!-- 👑 ওপরের অফিশিয়াল স্ট্যাটাস ডিসপ্লে বার (উইঙ্গো ও ডাইস ৩ডি অবিকল ক্লোন) -->
        <div class="top-status-header">
            <div class="game-title">CHICKEN <span class="title-accent">ROAD</span> <span class="help-icon">?</span></div>
            <div class="live-win-counter" id="live-win-multiplier">0.00 ৳ <span class="menu-burger">≡</span></div>
        </div>

        <!-- 🛣️ ডাইনামিক মেগা আনলিমিটেড হরিজন্টাল স্ক্রোল হাইওয়ে এরینا -->
        <div class="highway-arena" id="highway-map">
            
            <!-- 🐓 [১. প্রারম্ভিক নিরাপদ জোন]: অন্য গেমের অবিকল ফার্স্ট কলাম কাঠামো -->
            <div class="starting-safe-sidewalk">
                <div class="safe-zone-lbl">START</div>
                <!-- 🐓 [🔒 আপনার আপলোড করা chicken-red.png ৩D ব্রিডিং মোশন ইঞ্জিন লক 🔒] -->
                <div class="animated-chicken-vector" id="chicken-hero">
                    <img src="chicken-red.png" class="chicken-png-node" id="chicken-img-core" alt="🐔" onerror="this.src='./chicken-red.png';">
                    <div id="chicken-shadow"></div>
                </div>
            </div>

            <!-- 🚧 ডাইনামিক লেনের কন্টেইনার (৪-স্তর ওOdds চার্ট অনুযায়ী ওটো-লোড হবে ওস্তাদ!) -->
            <div id="dynamic-lanes-wrapper" style="display: flex; height: 100%;"></div>

            <!-- 🏁 ডানের চূড়ান্ত উইনিং ফুটপাত জোন -->
            <div class="ending-win-sidewalk">
                <div class="win-zone-lbl">GOAL</div>
            </div>

        </div>

        <!-- 🎛️ নিচের মেইন বেٹنگ ড্যাশবোর্ড কন্ট্রোল প্যানেল (১০০% খাতার ড্রয়িং ও উইঙ্গো বেট গ্রিড ক্লোন) -->
        <div class="bottom-bet-dashboard">
            <div class="bet-id-row">Bet ID: <span class="arrow-down">▼</span></div>

            <!-- স্টেক ইনপুট প্যানেল -->
            <div class="stake-input-container">
                <button class="adjust-btn" onclick="adjustStake('minus')">—</button>
                <div class="stake-value-box"><span id="stake-display">5000.00</span> <span class="currency-sign">৳</span></div>
                <button class="adjust-btn" onclick="adjustStake('plus')">+</button>
                <button class="multiplier-btn" onclick="multiplyStake(0.5)">x0.5</button>
                <button class="multiplier-btn" onclick="multiplyStake(2.0)">x2.0</button>
                <div class="coin-stack-icon">🪙</div>
            </div>

            <!-- রিস্ক লেভেল ফিল্টার সিলেক্টর -->
            <div class="risk-dropdown-holder">
                <select id="risk-level-select" onchange="handleRiskLevelChange()">
                    <option value="Easy">Easy (30 Lanes)</option>
                    <option value="Medium">Medium (25 Lanes)</option>
                    <option value="Hard" selected>Hard (20 Lanes)</option>
                    <option value="Hardcore">Hardcore (15 Lanes)</option>
                </select>
            </div>

            <!-- পাশাপাশি ডাবল বাটন গ্রিড প্যানেল -->
            <div class="double-action-button-grid">
                <button class="jili-cashout-btn" id="cashout-action-btn" onclick="executeChickenCashOutSequence()" disabled>Cashout</button>
                <button class="jili-play-btn" id="play-action-btn" onclick="executeChickenStepJumpSequence()">Play</button>
            </div>
        </div>

    </div>

    <!-- 📢 ক্যাসিনো রিয়েল-টাইমে অডিও ও Sockets নেটওয়ার্ক ড্রাইভার -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        const SERVER_URL = window.location.origin;

        let balance = 5000.00; 
        let currentStake = 5000.00; 
        let gameStateStatus = "IDLE"; 
        let currentLanePosition = -1;
        let vehicleSpawnIntervalsList = [];

        // 🎯 ৩০, ২৫, ২০, ১৫ লেনের ৪-স্তর ওOdds ম্যাপ (আল্লাহর রহমতে কাঁটায় কাঁটায় নিখুঁত লকিং!)
        const chickenRoadMultiRiskLadders = {
            "Easy": [1.02, 1.05, 1.08, 1.12, 1.16, 1.20, 1.25, 1.30, 1.35, 1.41, 1.47, 1.54, 1.61, 1.69, 1.77, 1.86, 1.96, 2.07, 2.19, 2.32, 2.46, 2.62, 2.80, 3.00, 3.23, 3.49, 3.80, 4.15, 4.56, 5.00], 
            "Medium": [1.05, 1.11, 1.18, 1.26, 1.35, 1.45, 1.56, 1.68, 1.82, 1.98, 2.16, 2.37, 2.61, 2.89, 3.22, 3.61, 4.08, 4.64, 5.32, 6.16, 7.20, 8.52, 10.22, 12.50, 15.50], 
            "Hard": [1.12, 1.26, 1.42, 1.62, 1.85, 2.13, 2.47, 2.89, 3.41, 4.05, 4.86, 5.90, 7.26, 9.07, 11.52, 14.92, 19.82, 27.02, 38.28, 56.50], 
            "Hardcore": [1.25, 1.56, 1.98, 2.56, 3.38, 4.56, 6.30, 8.92, 13.08, 19.85, 31.42, 52.34, 91.60, 172.50, 350.00] 
        };

        // 🚗 [🔒 আপনার আপলোড করা ৩টি ওরিজিনাল কার পিএনজি ইমেজ অ্যারে লক 🔒]
        const pngVehiclesLibrary = ["car1.png", "car2.png", "car3.png", "./car1.png", "./car2.png", "./car3.png"];

        function generateDynamicRiskLanesUI() {
            let selectedRisk = document.getElementById("risk-level-select").value;
            let activeLadder = chickenRoadMultiRiskLadders[selectedRisk];
            let wrapper = document.getElementById("dynamic-lanes-wrapper");
            
            wrapper.innerHTML = ""; 
            activeLadder.forEach((odds, index) => {
                let laneNode = document.createElement("div");
                laneNode.className = "road-lane";
                laneNode.setAttribute("data-lane", index);
                laneNode.innerHTML = `<div class="lane-manhole-node" id="odds-${index}">${odds}</div>`;
                wrapper.appendChild(laneNode);
            });
            startHighVelocityTrafficSpawnerEngine(); 
        }

        function handleRiskLevelChange() {
            playAudio('click');
            generateDynamicRiskLanesUI();
        }

        setTimeout(() => { generateDynamicRiskLanesUI(); }, 100);

        // 🔌 [উইঙ্গো কালার ট্রেড ওরিজিনাল রিয়েল-টাইม সকেট ব্যালেন্স সিঙ্ক গেটওয়ে]
        const socket = io(SERVER_URL);
        socket.on('balanceUpdate', (data) => {
            if (data && data.username === urlUserId) {
                let updatedBal = parseFloat(data.balance);
                if (!isNaN(updatedBal)) {
                    balance = updatedBal;
                    document.getElementById("live-win-multiplier").innerHTML = `${balance.toFixed(2)} ৳ <span class="menu-burger">≡</span>`;
                    
                    if (window.parent && window.parent.postMessage) {
                        window.parent.postMessage({ action: "refreshBalance", balance: balance }, "*");
                    }
                }
            }
        });

        // 🚨 [🔒 অন্য গেমের অবিকল ব্যালেন্স পাথ সিঙ্ক লক 🔒]
        async function fetchLivePlatformBalanceSync() {
            try {
                const res = await fetch(`${SERVER_URL}/api/chicken-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await res.json();
                if (data && data.success) {
                    let fetchedBal = parseFloat(data.balance);
                    if (!isNaN(fetchedBal)) {
                        balance = fetchedBal;
                        document.getElementById("live-win-multiplier").innerHTML = `${balance.toFixed(2)} ৳ <span class="menu-burger">≡</span>`;
                    }
                }
            } catch (e) {
                document.getElementById("live-win-multiplier").innerHTML = `${balance.toFixed(2)} ৳ <span class="menu-burger">≡</span>`;
            }
        }
        fetchLivePlatformBalanceSync();

        function adjustStake(action) {
            if (gameStateStatus === "PLAYING") return;
            if (action === 'minus' && currentStake > 10) currentStake -= 10;
            if (action === 'plus' && currentStake < 20000) currentStake += 10;
            document.getElementById("stake-display").innerText = currentStake.toFixed(2);
            playAudio('click');
        }

        function multiplyStake(factor) {
            if (gameStateStatus === "PLAYING") return;
            currentStake = currentStake * factor;
            if (currentStake < 1) currentStake = 1.00;
            if (currentStake > 20000) currentStake = 20000.00;
            document.getElementById("stake-display").innerText = currentStake.toFixed(2);
            playAudio('click');
        }

          // 🚗 [🔒 ওস্তাদ! অন্য গেমের সিএসএস ক্লাস সিঙ্ক ট্রাফিক মোশন ইঞ্জিন লক 🔒]
        function startHighVelocityTrafficSpawnerEngine() {
            clearActiveTrafficEngine();
            let lanes = document.querySelectorAll(".road-lane");
            
            lanes.forEach((lane, index) => {
                // প্রতিটা পাকা রাস্তার জন্য আলাদা আলাদা ডাইনামিক স্পিড ও টাইমিং লকিং, যাতে ২৪ ঘণ্টা থিক ট্রাফিক অবিরাম চলতে থাকে!
                let spawnSpeed = Math.random() * (900 - 450) + 450; 
                
                let intervalIdx = setInterval(() => {
                    if (gameStateStatus === "GAMEOVER") return;
                    
                    let vehicleNode = document.createElement("div");
                    // 🚨 [ওস্তাদ! মেইন সিএসএস এর ট্রাফিক ক্লাস (.car .ambient-car) এর সাথে ১০০% মিলিয়ে ক্লাস সেট করা হলো! এর ফলে গাড়ি রাস্তায় সবসময় অন ফায়ার চলবেই চলবে ভাই!]
                    vehicleNode.className = "dynamic-vehicle-vessel car ambient-car";
                    
                    let chosenCarImage = pngVehiclesLibrary[Math.floor(Math.random() * pngVehiclesLibrary.length)];
                    vehicleNode.innerHTML = `<img src="${chosenCarImage}" class="car-png-node" alt="🚘">`;
                    
                    // স্ক্রিনের বাহিরে টপ জোন থেকে স্পন হবে
                    vehicleNode.style.top = "-120px";
                    
                    // প্লেয়ার যাতে দেখে দেখে ফাঁকা জায়গা ও টাইমিং হিসাব করে মুরগি পার করতে পারে—তার জন্য চমৎকার ডাইনামিক স্পিড লকিং
                    let driveDuration = Math.random() * (1.9 - 0.8) + 0.8; 
                    vehicleNode.style.animation = `driveDownAnim ${driveDuration}s linear forwards`;
                    
                    lane.appendChild(vehicleNode);
                    setTimeout(() => { vehicleNode.remove(); }, 2300); 
                }, spawnSpeed + (index * 120)); 
                
                vehicleSpawnIntervalsList.push(intervalIdx);
            });
        }

        function clearActiveTrafficEngine() {
            vehicleSpawnIntervalsList.forEach(clearInterval);
            vehicleSpawnIntervalsList = [];
            document.querySelectorAll(".dynamic-vehicle-vessel").forEach(v => v.remove());
        }

        function resetAllManholeGlows() {
            document.querySelectorAll(".lane-manhole-node").forEach(m => m.className = "lane-manhole-node");
        }

        // 🎮 [🐓 গ্র্যান্ড চিকেন ROAD কোর গেমপ্লে MASTER কন্ট্রোলার 🐓]
        async function executeChickenStepJumpSequence() {
            let playBtn = document.getElementById("play-action-btn");
            let cashBtn = document.getElementById("cashout-action-btn");

            playBtn.removeAttribute("disabled");

            if (gameStateStatus === "IDLE" || gameStateStatus === "GAMEOVER") {
                gameStateStatus = "IDLE"; 
                let selectedRisk = document.getElementById("risk-level-select").value;
                playBtn.disabled = true;
                playAudio('click');
                try {
                    const res = await fetch(`${SERVER_URL}/api/chicken-bet`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: urlUserId, amount: parseFloat(currentStake), wallet: urlWallet, riskLevel: selectedRisk })
                    });
                    const data = await res.json();
                    if (data.success) {
                        gameStateStatus = "PLAYING"; 
                        currentLanePosition = -1;
                        
                        let chickenImg = document.getElementById("chicken-img-core");
                        chickenImg.src = "chicken-red.png"; /* 👈 ওস্তাদ! আপনার আপলোড করা chicken-red.png তাজা লক! */
                        chickenImg.style.display = 'block';
                        
                        let chicken = document.getElementById("chicken-hero");
                        chicken.style.left = "10px"; 
                        chicken.style.top = "42%";
                        chicken.className = "animated-chicken-vector";
                        
                        document.getElementById("risk-level-select").disabled = true;
                        resetAllManholeGlows();

                        playBtn.innerText = "JUMP"; 
                        playBtn.className = "jili-play-btn jump-mode-blue";
                        cashBtn.disabled = true;
                        cashBtn.innerText = "Cashout";

                        document.getElementById("highway-map").scrollLeft = 0;
                        fetchLivePlatformBalanceSync();
                    } else { alert(data.message || "❌ ব্যালেন্স অপ্রতুল ওস্তাদ!"); }
                } catch (e) {}
                playBtn.disabled = false;
                return;
            }

            if (gameStateStatus === "PLAYING") {
                playBtn.disabled = true;
                playAudio('jump'); 
                
                let selectedRisk = document.getElementById("risk-level-select").value;
                let crashProbability = 0.18; 
                if (selectedRisk === "Easy") crashProbability = 0.08;
                if (selectedRisk === "Medium") crashProbability = 0.13;
                if (selectedRisk === "Hardcore") crashProbability = 0.28;

                if (Math.random() < crashProbability) {
                    gameStateStatus = "GAMEOVER"; 
                    playAudio('crash'); 
                    
                    let chickenImg = document.getElementById("chicken-img-core");
                    chickenImg.src = "chicken-dead.png"; /* 👈 ওস্তাদ! আপনার আপলোড করা chicken-dead.png ডেড ফ্রেম লক! */
                    document.getElementById("chicken-hero").className = "animated-chicken-vector chicken-splat-dead";
                    
                    fetch(`${SERVER_URL}/api/chicken-loss`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: urlUserId, wallet: urlWallet })
                    }).catch(e => {});

                    setTimeout(() => { resetChickenRoadStadiumToIdle(); }, 1200); 
                    return;
                }

                currentLanePosition++;
                let activeLadder = chickenRoadMultiRiskLadders[selectedRisk];
                let currentMultiplier = activeLadder[currentLanePosition];

                let chicken = document.getElementById("chicken-hero");
                let targetLeftPixels = 100 + (currentLanePosition * 82); 
                chicken.style.left = `${targetLeftPixels}px`;
                
                resetAllManholeGlows();
                let activeManhole = document.getElementById(`odds-${currentLanePosition}`);
                if (activeManhole) activeManhole.className = "lane-manhole-node active-glow";

                playAudio('safe'); 

                // 🚀 [🔒 অটো-ক্যামেরা ডাইনামিক স্ক্রোল লুপ 🔒]
                let mapContainer = document.getElementById("highway-map");
                if (targetLeftPixels > (mapContainer.clientWidth / 2)) {
                    mapContainer.scrollTo({
                        left: targetLeftPixels - (mapContainer.clientWidth / 2),
                        behavior: 'smooth'
                    });
                }

                if (currentLanePosition >= activeLadder.length - 1) {
                    gameStateStatus = "GAMEOVER"; 
                    playAudio('win'); 
                    let winCash = currentStake * currentMultiplier;
                    
                    fetch(`${SERVER_URL}/api/chicken-win`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: urlUserId, amount: winCash, bet_amount: currentStake, wallet: urlWallet, multiplier: currentMultiplier })
                    }).catch(e => {});

                    setTimeout(() => { resetChickenRoadStadiumToIdle(); }, 1500);
                    return;
                }

                cashBtn.disabled = false;
                cashBtn.innerText = `Cashout (${currentMultiplier}x)`;
                cashBtn.className = "jili-cashout-btn cashout-mode-gold";
                playBtn.innerText = "JUMP";
                playBtn.disabled = false;
            }
        }

        async function executeChickenCashOutSequence() {
            let cashBtn = document.getElementById("cashout-action-btn");
            cashBtn.disabled = true;
            playAudio('win');
            
            let selectedRisk = document.getElementById("risk-level-select").value;
            let activeLadder = chickenRoadMultiRiskLadders[selectedRisk];
            let currentMultiplier = activeLadder[currentLanePosition];
            let winCash = currentStake * currentMultiplier;

            try {
                const res = await fetch(`${SERVER_URL}/api/chicken-win`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: urlUserId, amount: winCash, bet_amount: currentStake, wallet: urlWallet, multiplier: currentMultiplier })
                });
                const data = await res.json();
                if (data.success) {
                    gameStateStatus = "GAMEOVER"; 
                    resetChickenRoadStadiumToIdle();
                }
            } catch (e) {
                cashBtn.disabled = false;
            }
        }

                function resetChickenRoadStadiumToIdle() {
            let playBtn = document.getElementById("play-action-btn");
            let cashBtn = document.getElementById("cashout-action-btn");
            
            gameStateStatus = "IDLE"; 
            playBtn.innerText = "Play"; 
            playBtn.className = "jili-play-btn";
            playBtn.disabled = false;
            
            cashBtn.disabled = true;
            cashBtn.innerText = "Cashout";
            cashBtn.className = "jili-cashout-btn";

            document.getElementById("risk-level-select").disabled = false;
            resetAllManholeGlows();
            
            let chickenImg = document.getElementById("chicken-img-core");
            chickenImg.src = "chicken-red.png";
            
            let chicken = document.getElementById("chicken-hero");
            chicken.style.left = "10px"; 
            chicken.style.top = "42%";
            chicken.className = "animated-chicken-vector";
            
            document.getElementById("highway-map").scrollLeft = 0; 
            fetchLivePlatformBalanceSync();
            generateDynamicRiskLanesUI(); 
        }

        // 🔊 [🔒 গিটহাব ওরিজিনাল সাউন্ড ফাইলনেম ম্যাপিং কড়া লক 🔒]
        const slotSounds = {
            click: new Audio('click.mp3'),
            bet: new Audio('click.mp3'),
            jump: new Audio('jump.mp3'),
            crash: new Audio('crash.mp3'),
            safe: new Audio('safe.mp3'),
            win: new Audio('win.mp3')
        };
        Object.values(slotSounds).forEach(s => { s.load(); });

        function playAudio(type) {
            try { if (slotSounds[type]) { slotSounds[type].currentTime = 0; slotSounds[type].play().catch(e => {}); } } catch(e) {}
        }
    </script>
</body>
</html>
